<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Create Customer</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='admin.css') }}" />
</head>
<body>
  <main class="container container-medium">
    <h2>Create Customer FTP User</h2>
    <p><a href="{{ url_for('admin_users') }}">Back to Users</a></p>
    {% if error %}<p class="err">{{ error }}</p>{% endif %}
    {% if created_password %}
    <p class="ok">User created. Password (copy now): <code>{{ created_password }}</code></p>
    {% endif %}

    <form method="post" action="{{ url_for('admin_create_user') }}">
      <label>Username</label>
      <input type="text" name="username" required />

      <label>Customer Label</label>
      <input type="text" name="label" required />

      <label>Password (optional when auto-generate enabled)</label>
      <input type="text" name="password" />

      <label><input type="checkbox" name="auto_generate_password" value="1" /> Auto-generate password</label>
      <br /><br />
      <button type="submit" class="btn btn-primary">Create User</button>
    </form>
  </main>
</body>
</html>
