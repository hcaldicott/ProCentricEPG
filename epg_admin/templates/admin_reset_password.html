<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Change Password - {{ username }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='vendor/bulma.min.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='vendor/bulma-toast.css') }}" />
</head>
<body>
  <div class="modal is-active" id="edit-user-modal">
    <a class="modal-background" href="{{ url_for('admin_users') }}" aria-label="Close"></a>
    <div class="modal-card">
      <header class="modal-card-head">
        <p class="modal-card-title">Change Password: {{ username }}</p>
        <a href="{{ url_for('admin_users') }}" class="delete" aria-label="Close"></a>
      </header>
      <section class="modal-card-body">
        {% if error %}
        <div class="notification is-danger is-light">{{ error }}</div>
        {% endif %}

        <form method="post" action="{{ url_for('admin_change_password', username=username) }}" id="edit-user-form">
          <div class="field">
            <label class="label">Username</label>
            <input class="input" type="text" value="{{ username }}" disabled />
          </div>

          <div class="field">
            <label class="label">New Password</label>
            <div class="field has-addons">
              <div class="control is-expanded">
                <input
                  class="input"
                  type="password"
                  name="new_password"
                  id="new-password-input"
                  autocomplete="new-password"
                />
              </div>
              <div class="control">
                <button type="button" class="button is-info is-light" id="generate-password-btn">Generate</button>
              </div>
            </div>
            <p class="help">Leave blank to keep the current password.</p>
          </div>
        </form>
      </section>
      <footer class="modal-card-foot">
        <div class="buttons">
          <button type="submit" form="edit-user-form" class="button is-primary">Save Changes</button>
          <a href="{{ url_for('admin_users') }}" class="button">Cancel</a>
        </div>
      </footer>
    </div>
  </div>

  <div id="copy-toast" class="notification is-success is-light toast-corner is-hidden" role="status" aria-live="polite">
    <button class="delete" type="button" id="copy-toast-close" aria-label="Dismiss"></button>
    <span id="copy-toast-message">Generated password copied to clipboard.</span>
  </div>

  <script src="{{ url_for('static', filename='js/toast-tools.js') }}"></script>
  <script src="{{ url_for('static', filename='js/password-tools.js') }}"></script>
  <script>
    (function () {
      window.EPGPasswordTools.initPasswordGenerator({
        passwordInputId: "new-password-input",
        generateButtonId: "generate-password-btn",
        toastId: "copy-toast",
        toastMessageId: "copy-toast-message",
        toastCloseId: "copy-toast-close",
      });
    })();
  </script>
</body>
</html>
