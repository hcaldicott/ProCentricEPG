name: Build and Publish Containers

on:
  push:
    branches:
      - main
    tags:
      - "epg-generator-v*"
      - "epg-admin-v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  epg-generator-image:
    if: github.ref_type != 'tag' || startsWith(github.ref_name, 'epg-generator-v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: vars
        shell: bash
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/procentric-epg-generator"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#epg-generator-v}"
            {
              echo "tags<<EOF"
              echo "${IMAGE}:${VERSION}"
              echo "${IMAGE}:latest"
              echo "EOF"
            } >> "${GITHUB_OUTPUT}"
          else
            SHA_SHORT="$(echo "${GITHUB_SHA}" | cut -c1-7)"
            {
              echo "tags<<EOF"
              echo "${IMAGE}:edge"
              echo "${IMAGE}:sha-${SHA_SHORT}"
              echo "EOF"
            } >> "${GITHUB_OUTPUT}"
          fi

      - name: Build and push epg-generator image
        uses: docker/build-push-action@v6
        with:
          context: ./epg_generator
          file: ./epg_generator/Dockerfile
          push: true
          tags: ${{ steps.vars.outputs.tags }}

  epg-admin-image:
    if: github.ref_type != 'tag' || startsWith(github.ref_name, 'epg-admin-v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: vars
        shell: bash
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/procentric-epg-epg-admin"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#epg-admin-v}"
            {
              echo "tags<<EOF"
              echo "${IMAGE}:${VERSION}"
              echo "${IMAGE}:latest"
              echo "EOF"
            } >> "${GITHUB_OUTPUT}"
          else
            SHA_SHORT="$(echo "${GITHUB_SHA}" | cut -c1-7)"
            {
              echo "tags<<EOF"
              echo "${IMAGE}:edge"
              echo "${IMAGE}:sha-${SHA_SHORT}"
              echo "EOF"
            } >> "${GITHUB_OUTPUT}"
          fi

      - name: Build and push epg-admin image
        uses: docker/build-push-action@v6
        with:
          context: ./epg_admin
          file: ./epg_admin/Dockerfile
          push: true
          tags: ${{ steps.vars.outputs.tags }}
