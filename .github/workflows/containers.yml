name: Build and Publish Containers

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  packages: write

jobs:
  epg-generator-image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: vars
        shell: bash
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/procentric-epg-generator"
          SHA_SHORT="$(echo "${GITHUB_SHA}" | cut -c1-7)"
          {
            echo "tags<<EOF"
            echo "${IMAGE}:edge"
            echo "${IMAGE}:sha-${SHA_SHORT}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Build and push epg-generator image
        uses: docker/build-push-action@v6
        with:
          context: ./epg_generator
          file: ./epg_generator/Dockerfile
          push: true
          tags: ${{ steps.vars.outputs.tags }}

  epg-admin-image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: vars
        shell: bash
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/procentric-epg-epg-admin"
          SHA_SHORT="$(echo "${GITHUB_SHA}" | cut -c1-7)"
          {
            echo "tags<<EOF"
            echo "${IMAGE}:edge"
            echo "${IMAGE}:sha-${SHA_SHORT}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Build and push epg-admin image
        uses: docker/build-push-action@v6
        with:
          context: ./epg_admin
          file: ./epg_admin/Dockerfile
          push: true
          tags: ${{ steps.vars.outputs.tags }}
