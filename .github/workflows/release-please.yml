name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write
  pull-requests: write
  issues: write
  packages: write

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      epg_generator_changed: ${{ steps.filter.outputs.epg_generator }}
      epg_admin_changed: ${{ steps.filter.outputs.epg_admin }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Detect changed package paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            epg_generator:
              - 'epg_generator/**'
            epg_admin:
              - 'epg_admin/**'

  release-please-epg-generator:
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.epg_generator_changed == 'true'
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.release.outputs['epg_generator--release_created'] }}
      tag: ${{ steps.release.outputs['epg_generator--tag_name'] }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          path: epg_generator
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json

  release-please-epg-admin:
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.epg_admin_changed == 'true'
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.release.outputs['epg_admin--release_created'] }}
      tag: ${{ steps.release.outputs['epg_admin--tag_name'] }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          path: epg_admin
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json

  epg-generator-release-image:
    needs: release-please-epg-generator
    if: needs.release-please-epg-generator.outputs.released == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute release tags
        id: vars
        shell: bash
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/procentric-epg-generator"
          TAG="${{ needs.release-please-epg-generator.outputs.tag }}"
          VERSION="${TAG#epg-generator-v}"
          {
            echo "tags<<EOF"
            echo "${IMAGE}:${VERSION}"
            echo "${IMAGE}:latest"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Build and push epg-generator release image
        uses: docker/build-push-action@v6
        with:
          context: ./epg_generator
          file: ./epg_generator/Dockerfile
          push: true
          tags: ${{ steps.vars.outputs.tags }}

  epg-admin-release-image:
    needs: release-please-epg-admin
    if: needs.release-please-epg-admin.outputs.released == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute release tags
        id: vars
        shell: bash
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/procentric-epg-admin"
          TAG="${{ needs.release-please-epg-admin.outputs.tag }}"
          VERSION="${TAG#epg-admin-v}"
          {
            echo "tags<<EOF"
            echo "${IMAGE}:${VERSION}"
            echo "${IMAGE}:latest"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Build and push epg-admin release image
        uses: docker/build-push-action@v6
        with:
          context: ./epg_admin
          file: ./epg_admin/Dockerfile
          push: true
          tags: ${{ steps.vars.outputs.tags }}
